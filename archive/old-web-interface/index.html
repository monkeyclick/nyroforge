<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Workstation Management</title>
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.1/dist/amazon-cognito-identity.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .dashboard {
            display: none;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .btn-danger {
            background: #e53e3e;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .workstation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .workstation-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .workstation-card.running {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .workstation-card.stopped {
            border-color: #ed8936;
            background: #fffaf0;
        }

        .workstation-card.terminated,
        .workstation-card.terminating {
            border-color: #cbd5e0;
            background: #f7fafc;
        }

        .workstation-card.launching {
            border-color: #4299e1;
            background: #ebf8ff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-running {
            background: #48bb78;
            color: white;
        }

        .status-stopped {
            background: #ed8936;
            color: white;
        }

        .status-pending,
        .status-launching {
            background: #4299e1;
            color: white;
        }

        .status-terminated,
        .status-terminating {
            background: #718096;
            color: white;
        }

        .status-stopping {
            background: #ed8936;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin: 5% auto;
            width: 90%;
            max-width: 500px;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .success {
            color: #38a169;
            background: #c6f6d5;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">Media Workstation Management</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required value="mherson@amazon.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">
                    <span id="loginText">Sign In</span>
                    <span id="loginLoader" class="loading hidden"></span>
                </button>
                <div id="loginError" class="error hidden"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="logo">🖥️ Media Workstation Manager</div>
                <div class="user-info">
                    <span id="userName"></span>
                    <button id="adminBtn" class="btn hidden" onclick="window.location.href='/admin.html'" style="background: #667eea; margin-right: 10px;">👑 Admin</button>
                    <button class="btn" onclick="showProfileModal()" style="background: #667eea; margin-right: 10px;">⚙️ Settings</button>
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-number" id="totalWorkstations">0</span>
                    <div class="stat-label">Total Workstations</div>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="runningWorkstations">0</span>
                    <div class="stat-label">Running</div>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="monthlyCost">$0</span>
                    <div class="stat-label">Monthly Cost</div>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="availableRegions">0</span>
                    <div class="stat-label">Available Regions</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="card">
                <h3 style="margin-bottom: 20px;">Quick Actions</h3>
                <button class="btn" onclick="showLaunchModal()">🚀 Launch New Workstation</button>
                <button class="btn" onclick="refreshData()" style="margin-left: 10px;">🔄 Refresh Data</button>
            </div>

            <!-- Workstations -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Your Workstations</h3>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <label style="font-weight: 500;">Sort by:</label>
                        <select id="sortBy" onchange="applySortAndFilter()" style="padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px;">
                            <option value="createdAt-desc">Newest First</option>
                            <option value="createdAt-asc">Oldest First</option>
                            <option value="status">Status</option>
                            <option value="instanceType">Instance Type</option>
                            <option value="region">Region</option>
                        </select>
                        <select id="filterStatus" onchange="applySortAndFilter()" style="padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px;">
                            <option value="all">All Statuses</option>
                            <option value="running">Running</option>
                            <option value="stopped">Stopped</option>
                            <option value="launching">Launching</option>
                            <option value="terminated">Terminated</option>
                        </select>
                        <span id="autoRefreshIndicator" style="color: #48bb78; font-size: 12px; display: none;">● Auto-refreshing</span>
                    </div>
                </div>
                <div id="workstationGrid" class="workstation-grid">
                    <div style="text-align: center; padding: 40px; color: #666;">
                        Loading workstations...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Launch Modal -->
    <div id="launchModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Launch New Workstation</h3>
            <form id="launchForm">
                <div class="form-group">
                    <label>Region</label>
                    <select id="region" required>
                        <option value="">Select Region...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Instance Type</label>
                    <select id="instanceType" required>
                        <option value="">Select Instance Type...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Windows Version</label>
                    <select id="windowsVersion" required>
                        <option value="Windows_Server-2022-English-Full-Base">Windows Server 2022</option>
                        <option value="Windows_Server-2019-English-Full-Base">Windows Server 2019</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Authentication Method</label>
                    <select id="authMethod" required>
                        <option value="local">Local Admin</option>
                        <option value="domain">Domain Join</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Auto-Terminate</label>
                    <select id="autoTerminate" required>
                        <option value="0">Never Terminate</option>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="4">4 Hours</option>
                        <option value="8" selected>8 Hours</option>
                        <option value="12">12 Hours</option>
                        <option value="24">24 Hours</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button type="button" class="btn" onclick="closeLaunchModal()" style="background: #666; margin-right: 10px;">Cancel</button>
                    <button type="submit" class="btn">Launch Workstation</button>
                </div>
                <div id="launchError" class="error hidden"></div>
                <div id="launchSuccess" class="success hidden"></div>
            </form>
        </div>
    </div>

    <!-- Profile/Settings Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">User Settings</h3>
            <form id="profileForm">
                <div class="form-group">
                    <label>Default Region</label>
                    <select id="profileDefaultRegion" required>
                        <option value="">Loading regions...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Default Instance Type</label>
                    <select id="profileDefaultInstanceType" required>
                        <option value="">Loading instance types...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Default Auto-Terminate</label>
                    <select id="profileDefaultAutoTerminate" required>
                        <option value="0">Never Terminate</option>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="4">4 Hours</option>
                        <option value="8">8 Hours</option>
                        <option value="12">12 Hours</option>
                        <option value="24">24 Hours</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preferred Windows Version</label>
                    <select id="profileWindowsVersion" required>
                        <option value="Windows_Server-2022-English-Full-Base">Windows Server 2022</option>
                        <option value="Windows_Server-2019-English-Full-Base">Windows Server 2019</option>
                    </select>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn" onclick="closeProfileModal()" style="background: #666; margin-right: 10px;">Cancel</button>
                    <button type="submit" class="btn">Save Settings</button>
                </div>
                <div id="profileError" class="error hidden"></div>
                <div id="profileSuccess" class="success hidden"></div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'https://39u8v8hgo8.execute-api.us-west-2.amazonaws.com/api';
        const AWS_REGION = 'us-west-2';
        const USER_POOL_ID = 'us-west-2_9cSucj3GX';
        const CLIENT_ID = '3e46qh33pbdpduk442ilo9fvra';

        // AWS Cognito setup
        const poolData = {
            UserPoolId: USER_POOL_ID,
            ClientId: CLIENT_ID
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
        let currentUser = null;
        let authToken = null;
        let userProfile = null;
        let allWorkstations = [];
        let autoRefreshInterval = null;

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            
            // Event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('launchForm').addEventListener('submit', handleLaunch);
            document.getElementById('profileForm').addEventListener('submit', handleProfileSave);
        });

        // Authentication functions
        function checkAuthStatus() {
            currentUser = userPool.getCurrentUser();
            if (currentUser) {
                currentUser.getSession((err, session) => {
                    if (err) {
                        console.error(err);
                        showLogin();
                        return;
                    }
                    if (session.isValid()) {
                        authToken = session.getIdToken().getJwtToken();
                        showDashboard();
                        loadDashboardData();
                        loadUserProfile();
                    } else {
                        showLogin();
                    }
                });
            } else {
                showLogin();
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('loginText').style.display = 'none';
            document.getElementById('loginLoader').classList.remove('hidden');
            
            const authenticationData = {
                Username: email,
                Password: password,
            };
            const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);

            const userData = {
                Username: email,
                Pool: userPool,
            };
            const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

            cognitoUser.authenticateUser(authenticationDetails, {
                onSuccess: function (session) {
                    authToken = session.getIdToken().getJwtToken();
                    currentUser = cognitoUser;
                    showDashboard();
                    loadDashboardData();
                    loadUserProfile();
                },
                onFailure: function(err) {
                    console.error(err);
                    document.getElementById('loginError').textContent = err.message || 'Login failed';
                    document.getElementById('loginError').classList.remove('hidden');
                    document.getElementById('loginText').style.display = 'inline';
                    document.getElementById('loginLoader').classList.add('hidden');
                },
                mfaSetup: function(challengeName, challengeParameters) {
                    console.log('MFA setup requested but not configured - skipping');
                    document.getElementById('loginError').textContent = 'MFA is not configured. Please contact administrator.';
                    document.getElementById('loginError').classList.remove('hidden');
                    document.getElementById('loginText').style.display = 'inline';
                    document.getElementById('loginLoader').classList.add('hidden');
                },
                newPasswordRequired: function(userAttributes, requiredAttributes) {
                    // Handle new password required
                    console.log('New password required - prompting user');
                    console.log('User attributes:', userAttributes);
                    console.log('Required attributes:', requiredAttributes);
                    
                    document.getElementById('loginText').style.display = 'inline';
                    document.getElementById('loginLoader').classList.add('hidden');
                    
                    const newPassword = prompt('You must change your password. Please enter a new password (min 8 characters, with uppercase, lowercase, and numbers):');
                    
                    if (!newPassword) {
                        document.getElementById('loginError').textContent = 'Password change required to continue';
                        document.getElementById('loginError').classList.remove('hidden');
                        return;
                    }
                    
                    // Validate password
                    if (newPassword.length < 8 || !/[A-Z]/.test(newPassword) || !/[a-z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
                        document.getElementById('loginError').textContent = 'Password must be at least 8 characters with uppercase, lowercase, and numbers';
                        document.getElementById('loginError').classList.remove('hidden');
                        return;
                    }
                    
                    document.getElementById('loginText').style.display = 'none';
                    document.getElementById('loginLoader').classList.remove('hidden');
                    
                    // Prepare attributes for password change
                    const attributesToSet = {};
                    
                    // Remove system-managed attributes
                    delete userAttributes.email_verified;
                    delete userAttributes.email;
                    
                    // Add required attributes if missing
                    if (!userAttributes.given_name) {
                        const name = prompt('Please enter your first name:') || 'User';
                        attributesToSet.given_name = name;
                    }
                    
                    if (!userAttributes.family_name) {
                        const familyName = prompt('Please enter your last name:') || 'Name';
                        attributesToSet.family_name = familyName;
                    }
                    
                    // Merge all attributes
                    const finalAttributes = { ...userAttributes, ...attributesToSet };
                    
                    // Complete the password change
                    cognitoUser.completeNewPasswordChallenge(newPassword, finalAttributes, {
                        onSuccess: function(session) {
                            console.log('Password changed successfully');
                            authToken = session.getIdToken().getJwtToken();
                            currentUser = cognitoUser;
                            showDashboard();
                            loadDashboardData();
                            loadUserProfile();
                        },
                        onFailure: function(err) {
                            console.error('Password change failed:', err);
                            document.getElementById('loginError').textContent = err.message || 'Failed to change password';
                            document.getElementById('loginError').classList.remove('hidden');
                            document.getElementById('loginText').style.display = 'inline';
                            document.getElementById('loginLoader').classList.add('hidden');
                        },
                        mfaSetup: function(challengeName, challengeParameters) {
                            console.log('MFA setup requested but skipping - not implemented');
                            // MFA not implemented, just show success and login
                            authToken = cognitoUser.signInUserSession?.getIdToken()?.getJwtToken();
                            if (authToken) {
                                currentUser = cognitoUser;
                                showDashboard();
                                loadDashboardData();
                                loadUserProfile();
                            } else {
                                document.getElementById('loginError').textContent = 'Password changed. Please login again.';
                                document.getElementById('loginError').classList.remove('hidden');
                                document.getElementById('loginText').style.display = 'inline';
                                document.getElementById('loginLoader').classList.add('hidden');
                            }
                        }
                    });
                },
                mfaRequired: function(challengeName, challengeParameters) {
                    // Skip MFA for now
                    console.log('MFA required but not implemented');
                    document.getElementById('loginError').textContent = 'MFA not configured. Please contact administrator.';
                    document.getElementById('loginError').classList.remove('hidden');
                    document.getElementById('loginText').style.display = 'inline';
                    document.getElementById('loginLoader').classList.add('hidden');
                }
            });
        }

        function logout() {
            if (currentUser) {
                currentUser.signOut();
            }
            authToken = null;
            currentUser = null;
            showLogin();
        }

        // UI functions
        function showLogin() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginText').style.display = 'inline';
            document.getElementById('loginLoader').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            if (currentUser) {
                currentUser.getSession((err, session) => {
                    if (!err && session) {
                        // Check if user is admin
                        const payload = session.getIdToken().decodePayload();
                        const groups = payload['cognito:groups'] || [];
                        if (groups.includes('workstation-admin')) {
                            document.getElementById('adminBtn').classList.remove('hidden');
                        }
                    }
                });
                
                currentUser.getUserAttributes((err, attributes) => {
                    if (!err && attributes) {
                        const email = attributes.find(attr => attr.Name === 'email');
                        if (email) {
                            document.getElementById('userName').textContent = email.Value;
                        }
                    }
                });
            }
        }

        // API functions
        async function apiCall(endpoint, method = 'GET', body = null) {
            const url = `${API_BASE_URL}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            const options = {
                method,
                headers,
                mode: 'cors',
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(url, options);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API call failed:', error);
                throw error;
            }
        }

        // Dashboard data loading
        async function loadDashboardData() {
            try {
                await Promise.all([
                    loadWorkstations(),
                    loadRegions(),
                    loadInstanceTypes(),
                    loadCostData()
                ]);
                // Start auto-refresh
                startAutoRefresh();
            } catch (error) {
                console.error('Failed to load dashboard data:', error);
            }
        }

        function startAutoRefresh() {
            // Clear any existing interval
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            
            // Refresh every 30 seconds
            autoRefreshInterval = setInterval(() => {
                console.log('Auto-refreshing workstations...');
                document.getElementById('autoRefreshIndicator').style.display = 'inline';
                loadWorkstations().then(() => {
                    setTimeout(() => {
                        document.getElementById('autoRefreshIndicator').style.display = 'none';
                    }, 1000);
                });
            }, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        async function loadWorkstations() {
            try {
                const response = await apiCall('/workstations');
                console.log('Workstations API response:', response);
                
                // Handle both response formats: direct array or nested object
                let workstations = response.workstations || response;
                
                if (!Array.isArray(workstations)) {
                    throw new Error('Invalid workstations response format');
                }
                
                // Store for sorting/filtering
                allWorkstations = workstations;
                
                // Apply current sort and filter
                applySortAndFilter();
                updateStats(workstations);
            } catch (error) {
                console.error('Failed to load workstations:', error);
                document.getElementById('workstationGrid').innerHTML =
                    '<div style="text-align: center; padding: 40px; color: #e53e3e;">Failed to load workstations</div>';
            }
        }

        async function loadRegions() {
            const regionSelect = document.getElementById('region');
            
            try {
                console.log('Loading regions from API...');
                regionSelect.innerHTML = '<option value="">Loading regions...</option>';
                
                const response = await apiCall('/regions');
                console.log('Regions API response:', response);
                
                // Handle different response formats
                let regions = response;
                if (response && typeof response === 'object' && !Array.isArray(response)) {
                    // If response is wrapped in an object, try to extract the array
                    regions = response.regions || response.data || response.items || [response];
                }
                
                if (!Array.isArray(regions)) {
                    throw new Error('Invalid regions response format');
                }

                regionSelect.innerHTML = '<option value="">Select Region...</option>';
                
                regions.forEach(region => {
                    const option = document.createElement('option');
                    // Handle different region object formats
                    const regionName = region.RegionName || region.regionName || region.name || region;
                    const description = region.Description || region.description || '';
                    
                    option.value = regionName;
                    option.textContent = description ? `${regionName} (${description})` : regionName;
                    regionSelect.appendChild(option);
                });

                document.getElementById('availableRegions').textContent = regions.length;
                console.log(`Successfully loaded ${regions.length} regions`);
                
            } catch (error) {
                console.error('Failed to load regions from API:', error);
                
                // Fallback regions
                const fallbackRegions = [
                    { name: 'us-west-2', description: 'US West (Oregon)' },
                    { name: 'us-east-1', description: 'US East (N. Virginia)' },
                    { name: 'eu-west-1', description: 'Europe (Ireland)' },
                    { name: 'ap-southeast-1', description: 'Asia Pacific (Singapore)' }
                ];
                
                regionSelect.innerHTML = '<option value="">Select Region...</option>';
                fallbackRegions.forEach(region => {
                    const option = document.createElement('option');
                    option.value = region.name;
                    option.textContent = `${region.name} (${region.description})`;
                    regionSelect.appendChild(option);
                });
                
                document.getElementById('availableRegions').textContent = fallbackRegions.length;
                console.log('Using fallback regions due to API failure');
            }
        }

        async function loadInstanceTypes() {
            const instanceTypeSelect = document.getElementById('instanceType');
            
            try {
                console.log('Loading instance types from API...');
                instanceTypeSelect.innerHTML = '<option value="">Loading instance types...</option>';
                
                const response = await apiCall('/instance-types');
                console.log('Instance types API response:', response);
                
                // Handle different response formats
                let instanceTypes = response;
                if (response && typeof response === 'object' && !Array.isArray(response)) {
                    instanceTypes = response.instanceTypes || response.data || response.items || [response];
                }
                
                if (!Array.isArray(instanceTypes)) {
                    throw new Error('Invalid instance types response format');
                }

                instanceTypeSelect.innerHTML = '<option value="">Select Instance Type...</option>';
                
                instanceTypes.forEach(type => {
                    const option = document.createElement('option');
                    // Handle different instance type object formats
                    const instanceType = type.InstanceType || type.instanceType || type.type || type;
                    const vcpus = type.VCpus || type.vCpus || type.vcpus || 'N/A';
                    const memory = type.MemoryGb || type.memoryGb || type.memory || 'N/A';
                    const gpus = type.GPUs || type.gpus || type.GPU || 'N/A';
                    
                    option.value = instanceType;
                    option.textContent = `${instanceType} (${vcpus} vCPUs, ${memory}GB RAM, ${gpus} GPU)`;
                    instanceTypeSelect.appendChild(option);
                });
                
                console.log(`Successfully loaded ${instanceTypes.length} instance types`);
                
            } catch (error) {
                console.error('Failed to load instance types from API:', error);
                
                // Fallback instance types
                const fallbackTypes = [
                    { type: 'g4dn.xlarge', vcpus: 4, memory: 16, gpus: 1 },
                    { type: 'g4dn.2xlarge', vcpus: 8, memory: 32, gpus: 1 },
                    { type: 'g5.xlarge', vcpus: 4, memory: 16, gpus: 1 },
                    { type: 'g5.2xlarge', vcpus: 8, memory: 32, gpus: 1 },
                    { type: 'g6.xlarge', vcpus: 4, memory: 16, gpus: 1 },
                    { type: 'g6.2xlarge', vcpus: 8, memory: 32, gpus: 1 }
                ];
                
                instanceTypeSelect.innerHTML = '<option value="">Select Instance Type...</option>';
                fallbackTypes.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type.type;
                    option.textContent = `${type.type} (${type.vcpus} vCPUs, ${type.memory}GB RAM, ${type.gpus} GPU)`;
                    instanceTypeSelect.appendChild(option);
                });
                
                console.log('Using fallback instance types due to API failure');
            }
        }

        async function loadCostData() {
            try {
                const costs = await apiCall('/costs');
                document.getElementById('monthlyCost').textContent = 
                    `$${costs.monthlyTotal ? costs.monthlyTotal.toFixed(2) : '0.00'}`;
            } catch (error) {
                console.error('Failed to load cost data:', error);
            }
        }

        function applySortAndFilter() {
            const sortBy = document.getElementById('sortBy').value;
            const filterStatus = document.getElementById('filterStatus').value;
            
            // Filter workstations
            let filtered = [...allWorkstations];
            if (filterStatus !== 'all') {
                filtered = filtered.filter(ws => ws.status === filterStatus);
            }
            
            // Sort workstations
            filtered.sort((a, b) => {
                switch(sortBy) {
                    case 'createdAt-desc':
                        return new Date(b.createdAt || b.launchTime || 0) - new Date(a.createdAt || a.launchTime || 0);
                    case 'createdAt-asc':
                        return new Date(a.createdAt || a.launchTime || 0) - new Date(b.createdAt || b.launchTime || 0);
                    case 'status':
                        return (a.status || '').localeCompare(b.status || '');
                    case 'instanceType':
                        return (a.instanceType || '').localeCompare(b.instanceType || '');
                    case 'region':
                        return (a.region || '').localeCompare(b.region || '');
                    default:
                        return 0;
                }
            });
            
            displayWorkstations(filtered);
        }

        function displayWorkstations(workstations) {
            const grid = document.getElementById('workstationGrid');
            
            if (!workstations || workstations.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No workstations found. Launch your first workstation!</div>';
                return;
            }

            grid.innerHTML = workstations.map(ws => {
                // Extract workstation ID from PK if necessary
                const workstationId = ws.workstationId || ws.PK?.replace('WORKSTATION#', '') || 'Unknown';
                const status = ws.status || 'unknown';
                const instanceType = ws.instanceType || 'N/A';
                const region = ws.region || 'N/A';
                const createdAt = ws.createdAt || ws.launchTime;
                const isTerminated = status === 'terminated' || status === 'terminating';
                
                return `
                    <div class="workstation-card ${status.toLowerCase()}" style="${isTerminated ? 'opacity: 0.6; border-color: #cbd5e0;' : ''}">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h4 style="word-break: break-all;">${workstationId.substring(0, 20)}${workstationId.length > 20 ? '...' : ''}</h4>
                            <span class="status-badge status-${status.toLowerCase()}">${status}</span>
                        </div>
                        <p><strong>Instance:</strong> ${instanceType}</p>
                        <p><strong>Region:</strong> ${region}</p>
                        <p><strong>Instance ID:</strong> ${ws.instanceId || 'N/A'}</p>
                        <p><strong>Created:</strong> ${createdAt ? new Date(createdAt).toLocaleDateString() + ' ' + new Date(createdAt).toLocaleTimeString() : 'N/A'}</p>
                        ${ws.publicIp ? `<p><strong>IP:</strong> ${ws.publicIp}</p>` : ''}
                        <div style="margin-top: 15px;">
                            ${status === 'running' ? `
                                <button class="btn" onclick="getCredentials('${workstationId}')" style="font-size: 14px; padding: 8px 16px;">Get RDP</button>
                                <button class="btn btn-danger" onclick="terminateWorkstation('${workstationId}')" style="font-size: 14px; padding: 8px 16px; margin-left: 5px;">Terminate</button>
                            ` : isTerminated ? `
                                <button class="btn btn-danger" onclick="deleteWorkstation('${workstationId}')" style="font-size: 14px; padding: 8px 16px;">Delete Record</button>
                            ` : status === 'stopped' ? `
                                <button class="btn btn-danger" onclick="terminateWorkstation('${workstationId}')" style="font-size: 14px; padding: 8px 16px;">Terminate</button>
                            ` : `
                                <span style="color: #666; font-size: 14px;">${status === 'launching' ? 'Launching...' : 'Stopping...'}</span>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(workstations) {
            const total = workstations.length;
            const running = workstations.filter(ws => ws.status === 'running').length;
            
            document.getElementById('totalWorkstations').textContent = total;
            document.getElementById('runningWorkstations').textContent = running;
        }

        // Modal functions
        function showLaunchModal() {
            // Pre-populate with user preferences
            if (userProfile) {
                setTimeout(() => {
                    if (userProfile.defaultRegion) {
                        const regionSelect = document.getElementById('region');
                        for (let option of regionSelect.options) {
                            if (option.value === userProfile.defaultRegion) {
                                option.selected = true;
                                break;
                            }
                        }
                    }
                    if (userProfile.defaultInstanceType) {
                        const instanceTypeSelect = document.getElementById('instanceType');
                        for (let option of instanceTypeSelect.options) {
                            if (option.value === userProfile.defaultInstanceType) {
                                option.selected = true;
                                break;
                            }
                        }
                    }
                    if (userProfile.defaultAutoTerminateHours !== undefined) {
                        document.getElementById('autoTerminate').value = userProfile.defaultAutoTerminateHours;
                    }
                    if (userProfile.preferredWindowsVersion) {
                        document.getElementById('windowsVersion').value = userProfile.preferredWindowsVersion;
                    }
                }, 100); // Small delay to ensure dropdowns are populated
            }
            
            document.getElementById('launchModal').style.display = 'flex';
        }

        function closeLaunchModal() {
            document.getElementById('launchModal').style.display = 'none';
            document.getElementById('launchError').classList.add('hidden');
            document.getElementById('launchSuccess').classList.add('hidden');
        }

        async function handleLaunch(e) {
            e.preventDefault();
            
            const launchData = {
                region: document.getElementById('region').value,
                instanceType: document.getElementById('instanceType').value,
                osVersion: document.getElementById('windowsVersion').value,
                authMethod: document.getElementById('authMethod').value,
                autoTerminateHours: parseInt(document.getElementById('autoTerminate').value)
            };

            try {
                document.getElementById('launchError').classList.add('hidden');
                const result = await apiCall('/workstations', 'POST', launchData);
                
                document.getElementById('launchSuccess').textContent = 'Workstation launched successfully!';
                document.getElementById('launchSuccess').classList.remove('hidden');
                
                setTimeout(() => {
                    closeLaunchModal();
                    refreshData();
                }, 2000);
            } catch (error) {
                document.getElementById('launchError').textContent = error.message;
                document.getElementById('launchError').classList.remove('hidden');
            }
        }

        async function terminateWorkstation(workstationId) {
            if (!confirm('Are you sure you want to terminate this workstation? This will shut down the EC2 instance.')) {
                return;
            }

            try {
                await apiCall(`/workstations/${workstationId}`, 'DELETE');
                alert('Workstation is terminating. It will be removed from the list shortly.');
                refreshData();
            } catch (error) {
                alert('Failed to terminate workstation: ' + error.message);
            }
        }

        async function deleteWorkstation(workstationId) {
            if (!confirm('Are you sure you want to delete this workstation record? This will only remove the record from the database.')) {
                return;
            }

            try {
                const response = await apiCall(`/workstations/${workstationId}`, 'DELETE');
                console.log('Delete response:', response);
                
                // Immediately remove from the current list
                allWorkstations = allWorkstations.filter(ws => {
                    const wsId = ws.workstationId || ws.PK?.replace('WORKSTATION#', '');
                    return wsId !== workstationId;
                });
                
                // Re-apply current sort and filter
                applySortAndFilter();
                updateStats(allWorkstations);
                
                alert('Workstation record deleted successfully.');
            } catch (error) {
                console.error('Failed to delete workstation record:', error);
                alert('Failed to delete workstation record: ' + error.message);
            }
        }

        async function getCredentials(workstationId) {
            try {
                const credentials = await apiCall(`/workstations/${workstationId}/credentials`);
                
                const message = `
RDP Credentials for ${workstationId}:

Server: ${credentials.publicIp || credentials.privateIp}
Username: ${credentials.username}
Password: ${credentials.password}

You can use these credentials with Remote Desktop Connection.
                `;
                
                alert(message);
            } catch (error) {
                alert('Failed to get credentials: ' + error.message);
            }
        }

        // User Profile functions
        async function loadUserProfile() {
            try {
                console.log('Loading user profile...');
                const profile = await apiCall('/profile');
                console.log('User profile loaded:', profile);
                userProfile = profile;
            } catch (error) {
                console.error('Failed to load user profile:', error);
                // Create default profile
                userProfile = {
                    defaultRegion: 'us-west-2',
                    defaultInstanceType: 'g4dn.xlarge',
                    defaultAutoTerminateHours: 8,
                    preferredWindowsVersion: 'Windows_Server-2022-English-Full-Base'
                };
            }
        }

        function showProfileModal() {
            // Load current profile data into form
            loadProfileData();
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
            document.getElementById('profileError').classList.add('hidden');
            document.getElementById('profileSuccess').classList.add('hidden');
        }

        async function loadProfileData() {
            try {
                // Load regions and instance types for dropdowns
                const [regions, instanceTypes] = await Promise.all([
                    apiCall('/regions'),
                    apiCall('/instance-types')
                ]);

                // Populate regions dropdown
                const regionSelect = document.getElementById('profileDefaultRegion');
                regionSelect.innerHTML = '<option value="">Select Region...</option>';
                
                let regionList = regions;
                if (regions && typeof regions === 'object' && !Array.isArray(regions)) {
                    regionList = regions.regions || regions.availableRegions || [];
                }
                
                regionList.forEach(region => {
                    const option = document.createElement('option');
                    const regionName = region.RegionName || region.regionName || region.name || region.id || region;
                    const description = region.Description || region.description || region.name || '';
                    
                    option.value = regionName;
                    option.textContent = description ? `${regionName} (${description})` : regionName;
                    if (userProfile?.defaultRegion === regionName) {
                        option.selected = true;
                    }
                    regionSelect.appendChild(option);
                });

                // Populate instance types dropdown
                const instanceTypeSelect = document.getElementById('profileDefaultInstanceType');
                instanceTypeSelect.innerHTML = '<option value="">Select Instance Type...</option>';
                
                let typeList = instanceTypes;
                if (instanceTypes && typeof instanceTypes === 'object' && !Array.isArray(instanceTypes)) {
                    typeList = instanceTypes.instanceTypes || instanceTypes.data || [];
                }
                
                typeList.forEach(type => {
                    const option = document.createElement('option');
                    const instanceType = type.InstanceType || type.instanceType || type.type || type;
                    const vcpus = type.VCpus || type.vCpus || type.vcpus || 'N/A';
                    const memory = type.MemoryGb || type.memoryGb || type.memory || 'N/A';
                    const gpus = type.GPUs || type.gpus || type.GPU || 'N/A';
                    
                    option.value = instanceType;
                    option.textContent = `${instanceType} (${vcpus} vCPUs, ${memory}GB RAM, ${gpus} GPU)`;
                    if (userProfile?.defaultInstanceType === instanceType) {
                        option.selected = true;
                    }
                    instanceTypeSelect.appendChild(option);
                });

                // Set current profile values
                if (userProfile) {
                    document.getElementById('profileDefaultAutoTerminate').value = userProfile.defaultAutoTerminateHours || 8;
                    document.getElementById('profileWindowsVersion').value = userProfile.preferredWindowsVersion || 'Windows_Server-2022-English-Full-Base';
                }

            } catch (error) {
                console.error('Failed to load profile data:', error);
            }
        }

        async function handleProfileSave(e) {
            e.preventDefault();
            
            try {
                document.getElementById('profileError').classList.add('hidden');
                document.getElementById('profileSuccess').classList.add('hidden');

                const profileData = {
                    defaultRegion: document.getElementById('profileDefaultRegion').value,
                    defaultInstanceType: document.getElementById('profileDefaultInstanceType').value,
                    defaultAutoTerminateHours: parseInt(document.getElementById('profileDefaultAutoTerminate').value),
                    preferredWindowsVersion: document.getElementById('profileWindowsVersion').value
                };

                await apiCall('/preferences', 'PATCH', profileData);
                userProfile = { ...userProfile, ...profileData };

                document.getElementById('profileSuccess').textContent = 'Settings saved successfully!';
                document.getElementById('profileSuccess').classList.remove('hidden');
                
                setTimeout(() => {
                    closeProfileModal();
                }, 2000);

            } catch (error) {
                console.error('Failed to save profile:', error);
                document.getElementById('profileError').textContent = 'Failed to save settings: ' + error.message;
                document.getElementById('profileError').classList.remove('hidden');
            }
        }

        function refreshData() {
            console.log('Manually refreshing data...');
            loadDashboardData();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });
    </script>
