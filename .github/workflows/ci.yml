name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint, Test & CDK Synth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Lint (root)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Lambda functions
        run: npm run build:lambdas

      - name: Create frontend build placeholder for CDK synth
        run: mkdir -p frontend/out && touch frontend/out/.gitkeep

      - name: Validate CDK stack (synth)
        run: npx cdk synth --app "npx ts-node bin/app.ts"
        env:
          # CDK requires an account/region context at synth time; use dummy values
          # so the synth step validates the stack without real AWS credentials.
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'us-west-2'

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (frontend)
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
